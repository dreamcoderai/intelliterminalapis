name: Deploy FastAPI + Postgres

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.DO_HOST }}
        username: ${{ secrets.DO_USER }}
        key: ${{ secrets.DO_SSH_KEY }}
        script: |
          set -e

          echo "Go to backend folder"
          cd ~/intelliterminalapis

          echo "Pull latest code"
          git pull origin main

          echo "Ensure Docker network exists"
          docker network inspect appnet >/dev/null 2>&1 || docker network create appnet

          # -----------------------
          # CLEAN OLD CONTAINERS
          # -----------------------
          echo "Removing conflicting containers"
          docker rm -f postgres-db 2>/dev/null || true
          docker rm -f intelliterminalapis-db-1 2>/dev/null || true
          docker rm -f fastapi-app 2>/dev/null || true

          # -----------------------
          # START POSTGRES (CLEAN)
          # -----------------------
          echo "Starting fresh Postgres"
          docker run -d \
            --name postgres-db \
            --network appnet \
            --env-file .env \
            -v postgres_data:/var/lib/postgresql/data \
            -p 5432:5432 \
            --restart always \
            postgres:15

          echo "Waiting for Postgres to be ready"
          sleep 5

          # -----------------------
          # FREE PORT 8000
          # -----------------------
          echo "Free port 8000 if occupied"
          docker ps --filter "publish=8000" -q | xargs -r docker stop
          docker ps -a --filter "publish=8000" -q | xargs -r docker rm

          # -----------------------
          # BUILD FASTAPI
          # -----------------------
          echo "Building FastAPI image"
          docker build -t fastapi-app .

          # -----------------------
          # RUN FASTAPI
          # -----------------------
          echo "Running FastAPI container"
          docker run -d \
            --name fastapi-app \
            --network appnet \
            -p 8000:8000 \
            --env-file .env \
            --restart always \
            fastapi-app

          echo "Deployment completed successfully 🚀"